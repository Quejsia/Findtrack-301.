<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>FindTrack - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

            theme: {
                extend: {
                    "colors": {
                        "surface": "#fffbff",

                        "on-secondary-fixed": "#0a483a",
                        "secondary-fixed": "#b5eedb",
                        "primary-container": "#9af4d6",
                        "secondary-container": "#b5eedb",
                        "inverse-primary": "#a0fadc",
                        "inverse-on-surface": "#9f9d90",
                        "tertiary-dim": "#775100",
                        "tertiary": "#865c00",
                        "on-error": "#ffffff",
                        "outline": "#82826c",
                        "on-background": "#393927",
                        "tertiary-container": "#fab83f",
                        "on-primary-fixed": "#004939",
                        "on-surface": "#393927",
                        "on-tertiary-fixed-variant": "#614100",
                        "background": "#fffbff",
                        "primary-dim": "#00654f",
                        "on-primary-fixed-variant": "#006852",
                        "surface-container-high": "#f1efd8",
                        "on-tertiary-container": "#553900",
                        "surface-variant": "#ebe9cf",
                        "error-dim": "#67040d",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#0f0f07",
                        "on-tertiary-fixed": "#3b2600",
                        "primary-fixed-dim": "#8ce5c8",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#235b4c",
                        "surface-bright": "#fffbff",
                        "primary": "#01725a",
                        "tertiary-fixed-dim": "#ebaa32",
                        "on-surface-variant": "#666551",
                        "on-primary-container": "#005d49",
                        "surface-container-low": "#fdfae7",
                        "surface-dim": "#e6e4ca",
                        "secondary-fixed-dim": "#a7e0cd",
                        "error": "#af3d3b",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#6e0a12",
                        "surface-container-highest": "#ebe9cf",
                        "outline-variant": "#bcbaa2",
                        "tertiary-fixed": "#fab83f",
                        "surface-container": "#f7f4df",
                        "primary-fixed": "#9af4d6",
                        "secondary": "#376e5e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "sm": "12px",
                        "gutter": "16px",
                        "xl": "32px",
                        "base": "8px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "body-lg": ["Dm Sans"],
                        "label-md": ["Poppins"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Dm Sans"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],

                }
            }
        }

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(1, 114, 90, 0.05);
        }
    </style>
</head>
<body class="bg-surface-container min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-on-surface">
<!-- Decorative Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
<div class="absolute top-40 -left-20 w-72 h-72 bg-secondary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
<div class="absolute -bottom-40 left-20 w-80 h-80 bg-tertiary-container rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>
</div>
<!-- Login Card -->
<main class="glass-panel w-full max-w-md rounded-xl p-xl relative z-10">
<!-- Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-primary mb-sm">FindTrack</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Welcome back to the community.</p>
</div>
<!-- Form -->
<form class="space-y-lg">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full pl-10 pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email" name="email" placeholder="you@example.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full pl-10 pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password">
<button type="button" class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" onclick="const input = this.previousElementSibling; const icon = this.querySelector('.material-symbols-outlined'); if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility'; } else { input.type = 'password'; icon.textContent = 'visibility_off'; }"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span></button></div>
<div class="flex justify-end mt-xs">
<a class="font-label-md text-label-md text-primary hover:text-primary-dim transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-sm px-md bg-primary text-on-primary rounded-lg font-body-lg text-body-lg font-medium hover:bg-primary-dim transition-colors shadow-sm flex items-center justify-center gap-sm" type="submit"><span class="material-symbols-outlined animate-spin text-on-primary" style="font-variation-settings: &quot;FILL&quot; 0;">progress_activity</span></button>
</form>
<!-- Footer -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline transition-all" href="#">Sign up</a>
</p>
</div>
</main>




</body></html>
