<h1 class="font-headline-lg text-headline-lg text-on-primary mb-6">Join the Community</h1>
<p class="font-body-lg text-body-lg text-primary-fixed-dim">
                    FindTrack brings people together to recover lost items and build trust. Start your journey with our supportive network today.
                </p>
</div>

<!-- Right Side: Sign Up Form -->
<div class="flex flex-1 flex-col justify-center px-4 py-12 sm:px-6 lg:flex-none lg:px-20 xl:px-24 bg-surface">
<div class="mx-auto w-full max-w-sm lg:w-96">
<div>
<h2 class="mt-8 font-headline-lg text-headline-lg text-on-surface">Create an account</h2>
<p class="mt-2 font-body-md text-body-md text-on-surface-variant">
                        Already a member? 
                        <a class="font-label-md text-label-md font-semibold text-primary hover:text-primary-dim transition-colors" href="#">Login here</a>
</p>
</div>
<div class="mt-10">
<div>
<form action="#" class="space-y-6" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface" for="name">Full Name</label>
<div class="mt-2">
<input autocomplete="name" class="block w-full rounded-lg border-0 py-3 px-4 text-on-surface bg-surface-container-low shadow-sm ring-1 ring-inset ring-outline-variant placeholder:text-outline focus:ring-2 focus:ring-inset focus:ring-primary sm:text-body-md font-body-md transition-shadow" id="name" name="name" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface" for="email">Email address</label>
<div class="mt-2">
<input autocomplete="email" class="block w-full rounded-lg border-0 py-3 px-4 text-on-surface bg-surface-container-low shadow-sm ring-1 ring-inset ring-outline-variant placeholder:text-outline focus:ring-2 focus:ring-inset focus:ring-primary sm:text-body-md font-body-md transition-shadow" id="email" name="email" required="" type="email"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="mt-2">
<input autocomplete="new-password" class="block w-full rounded-lg border-0 py-3 px-4 text-on-surface bg-surface-container-low shadow-sm ring-1 ring-inset ring-outline-variant placeholder:text-outline focus:ring-2 focus:ring-inset focus:ring-primary sm:text-body-md font-body-md transition-shadow" id="password" name="password" required="" type="password"/>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-low" id="terms" name="terms" required="" type="checkbox"/>
<label class="ml-3 block font-body-md text-body-md text-on-surface-variant" for="terms">
                                    I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                                </label>
</div>
<div>
<button class="flex w-full justify-center rounded-lg bg-primary-container px-3 py-3 font-label-md text-label-md font-semibold text-on-primary-container shadow-sm hover:bg-primary-fixed focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-colors" type="submit">
                                    Create Account
                                </button>
</div>
</form>
</div>
<div class="mt-10">
<div class="relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
